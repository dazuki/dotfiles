[mgr]
  ratio = [1, 3, 3]
  show_hidden = true

[opener]
  play_sfx = [
    { run = 'mpv --no-audio-display --keep-open=no --really-quiet "$1"', block = true, desc = "Play Audio" },
  ]

[open]
  prepend_rules = [{ mime = "audio/*", use = "play_sfx" }]

[[plugin.prepend_fetchers]]
  id = "git"
  url = "*"
  run = "git"

[[plugin.prepend_fetchers]]
  id = "git"
  url = "*/"
  run = "git"

[[plugin.prepend_previewers]]
  mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}"
  run = "ouch"

[[plugin.prepend_previewers]]
  mime = "application/sqlite3"
  run = 'piper -- sqlite3 "$1" ".schema --indent"'

[[plugin.prepend_previewers]]
  url = "*.md"
  run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'

[[plugin.prepend_previewers]]
  mime = "audio/*"
  run = "exifaudio"
